<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antrenman Takip</title>
    <style>
        /* Tamamen görünür olması için arka planı güncelledik */
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .card { 
            background: #2d2d2d; 
            padding: 15px; 
            margin-bottom: 15px; 
            border-radius: 8px; 
        }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        input { width: 60px; padding: 5px; color: black; }
        button { padding: 5px 10px; cursor: pointer; background: #bb86fc; border: none; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Antrenman Programı</h2>
    
    <!-- Örnek bir satır -->
    <div class="card">
        <div class="row">
            <span>Incline DB Press</span>
            <span id="prev-inc-db">0 kg</span>
        </div>
        <div class="row">
            <input type="number" id="input-inc-db" placeholder="Kg">
            <button onclick="kaydet('inc-db')">Kaydet</button>
        </div>
    </div>
</div>

<script>
    // Sayfa açıldığında yükle
    window.onload = function() {
        const idler = ['inc-db'];
        idler.forEach(id => {
            const val = localStorage.getItem(id);
            if(val) document.getElementById('prev-'+id).innerText = val + ' kg';
        });
    };

    function kaydet(id) {
        const val = document.getElementById('input-'+id).value;
        localStorage.setItem(id, val);
        document.getElementById('prev-'+id).innerText = val + ' kg';
        alert('Kaydedildi: ' + val + ' kg');
    }
</script>

</body>
</html>
